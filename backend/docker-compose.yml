version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-mlm_saudi}
      - DB_USERNAME=${DB_USERNAME:-mlm_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      - mysql
      - redis
    volumes:
      - storage_data:/var/www/storage
    networks:
      - mlm-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-mlm_saudi}
      - DB_USERNAME=${DB_USERNAME:-mlm_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=${REDIS_PORT:-6379}
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    volumes:
      - storage_data:/var/www/storage
    networks:
      - mlm-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan schedule:work
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-mlm_saudi}
      - DB_USERNAME=${DB_USERNAME:-mlm_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=${REDIS_PORT:-6379}
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    volumes:
      - storage_data:/var/www/storage
    networks:
      - mlm-network

  mysql:
    image: mysql:8.0
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-mlm_saudi}
      - MYSQL_USER=${DB_USERNAME:-mlm_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mlm-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_FORWARD:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mlm-network

volumes:
  mysql_data:
  redis_data:
  storage_data:

networks:
  mlm-network:
    driver: bridge
