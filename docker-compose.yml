version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mlm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mlm_platform
      POSTGRES_USER: mlm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mlm_secure_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlm_user -d mlm_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mlm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mlm_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: mlm-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-mlm_search_key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mlm-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mlm_platform
      DB_USERNAME: mlm_user
      DB_PASSWORD: ${DB_PASSWORD:-mlm_secure_pass_2024}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mlm_redis_pass}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY:-mlm_search_key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
      SANCTUM_STATEFUL_DOMAINS: ${APP_DOMAIN:-localhost}
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mlm-queue-worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mlm_platform
      DB_USERNAME: mlm_user
      DB_PASSWORD: ${DB_PASSWORD:-mlm_secure_pass_2024}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mlm_redis_pass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mlm-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mlm_platform
      DB_USERNAME: mlm_user
      DB_PASSWORD: ${DB_PASSWORD:-mlm_secure_pass_2024}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-mlm_redis_pass}
    depends_on:
      - backend
      - queue-worker

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mlm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${APP_DOMAIN:-localhost}/api
      NEXT_PUBLIC_WS_URL: wss://${APP_DOMAIN:-localhost}/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mlm-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_storage:/var/www/html/storage:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  backend_storage:
